<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文默書倒計時</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .countdown-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .countdown-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .card-title {
            font-size: 1.3rem;
            color: #2c3e50;
            font-weight: bold;
            line-height: 1.5;
        }

        .card-date {
            font-size: 0.95rem;
            color: #7f8c8d;
            margin-top: 10px;
        }

        .countdown-display {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }

        .time-unit {
            text-align: center;
            min-width: 70px;
        }

        .time-value {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 2rem;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            min-width: 70px;
            display: block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .time-label {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 8px;
            display: block;
            text-transform: uppercase;
        }

        .finished-message {
            text-align: center;
            color: #e74c3c;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 30px;
            width: 100%;
        }

        .current-time {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 1.1rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .countdown-grid {
                grid-template-columns: 1fr;
            }
            
            .time-value {
                font-size: 1.5rem;
                padding: 12px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 英文默書倒計時</h1>
        
        <div class="current-time" id="current-time"></div>
        
        <div class="countdown-grid">
            <!-- 倒計時器 1 -->
            <div class="countdown-card">
                <div class="card-header">
                    <div class="card-title">第二次英文默書<br>A 及 B 部份</div>
                    <div class="card-date">📅 3 月 31 日 星期二</div>
                </div>
                <div id="timer-1" class="countdown-display"></div>
            </div>

            <!-- 倒計時器 2 -->
            <div class="countdown-card">
                <div class="card-header">
                    <div class="card-title">第二次英文默書<br>適合啲部份</div>
                    <div class="card-date">📅 4 月 14 日 星期二</div>
                </div>
                <div id="timer-2" class="countdown-display"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 請在這裡修改年份（2025 或 2026）
        const YEAR = 2025;

        // 設定目標日期（默書當天 00:00:00）
        const targetDates = [
            { id: 'timer-1', date: new Date(`${YEAR}-03-31T00:00:00`), name: 'A 及 B 部份' },
            { id: 'timer-2', date: new Date(`${YEAR}-04-14T00:00:00`), name: '適合啲部份' }
        ];

        // 顯示當前時間
        function updateCurrentTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true
            };
            document.getElementById('current-time').textContent = 
                '🕐 當前時間：' + now.toLocaleString('zh-HK', options);
        }

        // 計算倒計時（從現在到目標日期）
        function updateCountdown(targetDate, elementId) {
            const now = new Date();
            const diff = targetDate - now;
            const element = document.getElementById(elementId);

            if (diff <= 0) {
                element.innerHTML = '<div class="finished-message">🎉 默書時間已到！</div>';
                return;
            }

            // 計算天、時、分、秒
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);

            element.innerHTML = `
                <div class="time-unit">
                    <span class="time-value">${String(days).padStart(2, '0')}</span>
                    <span class="time-label">天</span>
                </div>
                <div class="time-unit">
                    <span class="time-value">${String(hours).padStart(2, '0')}</span>
                    <span class="time-label">時</span>
                </div>
                <div class="time-unit">
                    <span class="time-value">${String(minutes).padStart(2, '0')}</span>
                    <span class="time-label">分</span>
                </div>
                <div class="time-unit">
                    <span class="time-value">${String(seconds).padStart(2, '0')}</span>
                    <span class="time-label">秒</span>
                </div>
            `;
        }

        // 每秒更新
        setInterval(() => {
            updateCurrentTime();
            targetDates.forEach(item => {
                updateCountdown(item.date, item.id);
            });
        }, 1000);

        // 立即執行一次
        updateCurrentTime();
        targetDates.forEach(item => {
            updateCountdown(item.date, item.id);
        });
    </script>
</body>
</html>
