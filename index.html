<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸彈倒計時器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .countdown-card {
            background: #1a1a2e;
            border: 3px solid #e74c3c;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.3);
            transition: transform 0.3s ease;
        }

        .countdown-card:hover {
            transform: translateY(-3px);
        }

        .countdown-card.completed {
            border-color: #27ae60;
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.3);
        }

        .bomb-icon {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 15px;
            animation: pulse 2s ease-in-out infinite;
        }

        .countdown-card.completed .bomb-icon {
            animation: none;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .card-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
        }

        .card-deadline {
            text-align: center;
            color: #95a5a6;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .countdown-display {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .countdown-card.completed .countdown-display {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .countdown-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            line-height: 2;
        }

        .time-number {
            color: #fff;
            font-weight: bold;
            display: inline-block;
            min-width: 30px;
        }

        .defused-message {
            background: rgba(39, 174, 96, 0.2);
            border: 2px solid #27ae60;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2ecc71;
        }

        .defused-icon {
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .card-title {
                font-size: 1.2rem;
            }
            
            .countdown-text {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 倒計時器</h1>
        
        <div id="countdown-container">
            <!-- 倒計時卡片將由 JavaScript 生成 -->
        </div>
    </div>

    <script>
        // 配置倒計時項目 - 請在這裡修改您的日期和標題
        const countdownItems = [
            {
                id: 1,
                title: "英默二 A及B部分",
                deadline: new Date("2026-03-24T23:59:59"),
                deadlineText: "2026年3月24日(二)"
            },
            {
                id: 2,
                title: "英默二 C及D部分",
                deadline: new Date("2026-03-27T23:59:59"),
                deadlineText: "2026年3月27日(五)"
            },
            // 可以添加更多倒計時項目
            // {
            //     id: 3,
            //     title: "您的標題",
            //     deadline: new Date("2026-04-01T23:59:59"),
            //     deadlineText: "2026年4月1日(三)"
            // }
        ];

        function updateCountdown() {
            const container = document.getElementById('countdown-container');
            container.innerHTML = '';

            countdownItems.forEach(item => {
                const now = new Date();
                const diff = item.deadline - now;
                
                const card = document.createElement('div');
                card.className = 'countdown-card';
                
                let content = '';
                
                if (diff <= 0) {
                    // 已到期
                    card.classList.add('completed');
                    content = `
                        <div class="bomb-icon">💣</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-deadline">截止時間：${item.deadlineText}</div>
                        <div class="defused-message">
                            <span class="defused-icon">🎉</span>炸彈已解除！
                        </div>
                    `;
                } else {
                    // 倒計時中
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    content = `
                        <div class="bomb-icon">💣</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-deadline">截止時間：${item.deadlineText}</div>
                        <div class="countdown-display">
                            <div class="countdown-text">
                                剩餘：<span class="time-number">${days}日</span> 
                                <span class="time-number">${hours}時</span> 
                                <span class="time-number">${minutes}分</span><br>
                                <span class="time-number">${seconds}秒</span>
                            </div>
                        </div>
                    `;
                }
                
                card.innerHTML = content;
                container.appendChild(card);
            });
        }

        // 立即更新
        updateCountdown();
        
        // 每秒更新
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
